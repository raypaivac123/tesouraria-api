spring.application.name=tesouraria

# porta da aplica’┐Į’┐Įo
server.port=${PORT:8080}

# conex’┐Įo com banco MySQL
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/tesouraria}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}

# driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# cria tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# mostra SQL no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUVGVzdGluZzEyMzQ1Njc4OTA=}
jwt.expiration=${JWT_EXPIRATION:86400000}

